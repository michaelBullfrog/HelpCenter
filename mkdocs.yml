site_name: Webex Knowledge Base
site_description: A clean, accurate, source-backed Webex knowledge repository.
site_url: https://YOUR-GITHUB-USERNAME.github.io/webex-knowledge-base/
repo_url: https://github.com/YOUR-GITHUB-USERNAME/webex-knowledge-base
repo_name: webex-knowledge-base
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - How to Use This KB: getting-started/how-to-use.md
      - Source Quality Rules: getting-started/source-quality.md
  - Control Hub:
      - Overview: control-hub/index.md
      - Roles and Permissions: control-hub/roles-permissions.md
      - Users and Licensing: control-hub/users-licensing.md
  - Webex Calling:
      - Overview: calling/index.md
      - Number Management: calling/number-management.md
      - Troubleshooting Calling: calling/troubleshooting.md
  - Contact Center:
      - Overview: contact-center/index.md
      - Setup Checklist: contact-center/setup-checklist.md
      - Agent and Supervisor Operations: contact-center/agent-supervisor-operations.md
      - Analyzer and Reporting: contact-center/analyzer-reporting.md
  - Meetings: meetings/index.md
  - Messaging: messaging/index.md
  - Devices: devices/index.md
  - APIs and Automation:
      - Overview: apis/index.md
      - Authentication: apis/authentication.md
      - Webhooks: apis/webhooks.md
      - Contact Center APIs: apis/contact-center-apis.md
  - Integrations:
      - Overview: integrations/index.md
      - Salesforce: integrations/salesforce.md
      - ServiceNow: integrations/servicenow.md
      - Zoho: integrations/zoho.md
  - Troubleshooting:
      - Overview: troubleshooting/index.md
      - Ticket Template: troubleshooting/ticket-template.md
      - Escalation Checklist: troubleshooting/escalation-checklist.md
  - Operations:
      - Change Management: operations/change-management.md
      - Release Notes Review: operations/release-notes-review.md
  - Reference:
      - Official Sources: reference/official-sources.md
      - Glossary: reference/glossary.md
      - Article Template: reference/article-template.md
